<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Sistema de Prestamos</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <header class="header-brand">
    <div class="brand">
      <h2>Sistema de Prestamos</h2>
      <p class="brand-sub">Beta v1.0</p>
    </div>

    <div class="header-actions">
      <span id="totalAdeudo" class="stat-pill is-red">$0.00</span>
      <span id="estadoConexion" class="lector off">Offline</span>
    </div>
  </header>

  <div class="beta-banner">
    <span>MODO BETA</span>
    <button class="btn-eliminar-datos" onclick="confirmarEliminarDatos()">Eliminar datos de prueba</button>
  </div>

  <section class="dashboard-grid">
    <article class="stat-card is-orange">
      <h3>Activos</h3>
      <p id="dashPrestamosActivos">0</p>
    </article>
    <article class="stat-card is-green">
      <h3>Clientes</h3>
      <p id="dashClientes">0</p>
    </article>
    <article class="stat-card">
      <h3>Pagos Mes</h3>
      <p id="dashPagosMes">0</p>
    </article>
    <article class="stat-card is-red">
      <h3>Atrasados</h3>
      <p id="dashAtrasados">0</p>
    </article>
  </section>

  <div class="panel-acciones">
    <button class="destacado" onclick="location.href='registro.html'">+ Nuevo Prestamo</button>
    <button onclick="location.href='registro.html#nuevo-cliente'">+ Nuevo Cliente</button>
    <button onclick="location.href='clientes.html'">Clientes</button>
    <button onclick="location.href='historial.html'">Historial</button>
    <button onclick="location.href='reportes.html'">Reportes</button>
  </div>

  <div class="filtros">
    <input type="text" id="buscador" placeholder="Buscar cliente...">
    <select id="filtroEstado">
      <option value="todos">Todos</option>
      <option value="activo">Activos</option>
      <option value="pagado">Pagados</option>
      <option value="atrasado">Atrasados</option>
    </select>
  </div>

  <div id="contenedorTabla" class="table-shell">
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Saldo</th>
          <th>Pagos</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaPrestamos"></tbody>
    </table>
  </div>

  <nav class="nav-bottom">
    <button class="active" onclick="location.href='index.html'">
      <span class="nav-icon">&#9632;</span>
      Inicio
    </button>
    <button onclick="location.href='registro.html'">
      <span class="nav-icon">+</span>
      Nuevo
    </button>
    <button onclick="location.href='clientes.html'">
      <span class="nav-icon">&#9744;</span>
      Clientes
    </button>
    <button onclick="location.href='historial.html'">
      <span class="nav-icon">&#9745;</span>
      Pagos
    </button>
    <button onclick="location.href='reportes.html'">
      <span class="nav-icon">&#9633;</span>
      Reportes
    </button>
  </nav>

  <div class="modal-confirm" id="modalEliminar">
    <div class="modal-confirm-content">
      <h3>Eliminar todos los datos</h3>
      <p>Esto eliminara TODOS los clientes, prestamos y pagos. Esta accion no se puede deshacer.</p>
      <div class="modal-confirm-actions">
        <button class="btn-cancelar" onclick="cerrarModalEliminar()">Cancelar</button>
        <button class="btn-confirmar-eliminar" onclick="eliminarDatosPrueba()">Si, eliminar todo</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>

  <script>
    let clientes = [];
    let prestamos = [];
    let pagos = [];

    window.addEventListener("load", async () => {
      const estadoConexion = document.getElementById("estadoConexion");
      actualizarEstadoConexion(estadoConexion);
      window.addEventListener("online", () => actualizarEstadoConexion(estadoConexion));
      window.addEventListener("offline", () => actualizarEstadoConexion(estadoConexion));

      await cargarDatos();
      await actualizarDashboard();
      renderTablaPrestamos();
      setupFiltros();

      setInterval(async () => {
        await cargarDatos();
        await actualizarDashboard();
        renderTablaPrestamos();
      }, 10000);
    });

    async function cargarDatos() {
      clientes = await obtenerClientes();
      prestamos = await obtenerPrestamos();
      pagos = await obtenerPagos();
    }

    function actualizarEstadoConexion(el) {
      if (!el) return;
      if (navigator.onLine) {
        el.textContent = "Online";
        el.className = "lector on";
        return;
      }
      el.textContent = "Offline";
      el.className = "lector off";
    }

    async function actualizarDashboard() {
      const activos = prestamos.filter(p => p.estado !== "pagado");
      const hoy = new Date().toISOString().split("T")[0];
      const atrasados = activos.filter(p => p.fecha_proximo_pago && p.fecha_proximo_pago < hoy);

      const mesActual = new Date().getMonth();
      const pagosDelMes = pagos.filter(p => {
        const fechaPago = new Date(p.fecha_pago);
        return fechaPago.getMonth() === mesActual && p.estado === "confirmado";
      });

      const totalAdeudo = activos.reduce((sum, p) => sum + (p.saldo_pendiente || 0), 0);

      document.getElementById("dashPrestamosActivos").textContent = activos.length;
      document.getElementById("dashClientes").textContent = clientes.length;
      document.getElementById("dashPagosMes").textContent = pagosDelMes.length;
      document.getElementById("dashAtrasados").textContent = atrasados.length;
      document.getElementById("totalAdeudo").textContent = `$${formatearMoneda(totalAdeudo)}`;
    }

    function renderTablaPrestamos() {
      const tbody = document.getElementById("tablaPrestamos");
      const filtroEstado = document.getElementById("filtroEstado").value;
      const buscador = document.getElementById("buscador").value.toLowerCase();
      const hoy = new Date().toISOString().split("T")[0];

      let filtered = [...prestamos];

      if (filtroEstado === "activo") filtered = filtered.filter(p => p.estado === "activo");
      else if (filtroEstado === "pagado") filtered = filtered.filter(p => p.estado === "pagado");
      else if (filtroEstado === "atrasado") filtered = filtered.filter(p => p.estado !== "pagado" && p.fecha_proximo_pago && p.fecha_proximo_pago < hoy);

      if (buscador) {
        filtered = filtered.filter(p => {
          const cliente = clientes.find(c => c.id === p.cliente_id);
          const nombre = cliente?.nombre || "";
          const matricula = cliente?.matricula || "";
          return nombre.toLowerCase().includes(buscador) || matricula.toLowerCase().includes(buscador);
        });
      }

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Sin prestamos registrados</td></tr>';
        return;
      }

      const esMobile = window.innerWidth < 768;
      
      tbody.innerHTML = filtered.map(p => {
        const cliente = clientes.find(c => c.id === p.cliente_id) || {};
        const nombre = cliente.nombre || "Sin nombre";
        const matricula = cliente.matricula || "-";
        const estadoClass = p.estado === "pagado" ? "badge-success" : (p.fecha_proximo_pago && p.fecha_proximo_pago < hoy ? "badge-danger" : "badge-warning");
        const estadoText = p.estado === "pagado" ? (esMobile ? "Pagado" : "Pagado") : (p.fecha_proximo_pago && p.fecha_proximo_pago < hoy ? (esMobile ? "Atrasado" : "Atrasado") : (esMobile ? "Activo" : "Activo"));

        return `
          <tr onclick="verDetallePrestamo('${p.id}')">
            <td data-label="Cliente"><strong>${nombre}</strong><br><small style="color:var(--gray-500)">${matricula}</small></td>
            <td data-label="Saldo"><strong>$${formatearMoneda(p.saldo_pendiente)}</strong></td>
            <td data-label="Pagos">${p.pagos_realizados || 0}/${p.total_pagos || 0}</td>
            <td data-label="Estado"><span class="badge ${estadoClass}">${estadoText}</span></td>
            <td data-label="">
              <button class="btn-sm btn-success" onclick="event.stopPropagation(); location.href='registro.html?prestamo=${p.id}'">Pago</button>
            </td>
          </tr>
        `;
      }).join("");
    }

    function setupFiltros() {
      document.getElementById("filtroEstado").addEventListener("change", renderTablaPrestamos);
      document.getElementById("buscador").addEventListener("input", renderTablaPrestamos);
    }

    function verDetallePrestamo(id) {
      const prestamo = prestamos.find(p => p.id === id);
      if (!prestamo) return;

      const cliente = clientes.find(c => c.id === prestamo.cliente_id);
      const pagosPrestamo = pagos.filter(p => p.prestamo_id === id);

      mostrarNotificacion(
        `Cliente: ${cliente?.nombre || "N/A"}\n` +
        `Monto: $${formatearMoneda(prestamo.monto_total)}\n` +
        `Saldo: $${formatearMoneda(prestamo.saldo_pendiente)}\n` +
        `Pagos: ${pagosPrestamo.length}/${prestamo.total_pagos || 0}`,
        "info"
      );
    }

    function confirmarEliminarDatos() {
      document.getElementById("modalEliminar").classList.add("show");
    }

    function cerrarModalEliminar() {
      document.getElementById("modalEliminar").classList.remove("show");
    }

    async function eliminarDatosPrueba() {
      const ok = await eliminarTodosLosDatos();
      if (ok) {
        clientes = [];
        prestamos = [];
        pagos = [];
        await actualizarDashboard();
        renderTablaPrestamos();
        cerrarModalEliminar();
        mostrarNotificacion("Todos los datos han sido eliminados", "success");
      } else {
        cerrarModalEliminar();
        mostrarNotificacion("Error al eliminar datos", "error");
      }
    }
  </script>
</body>
</html>
