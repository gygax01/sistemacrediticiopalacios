<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="Reportes y estadisticas del sistema de prestamos">
  <title>Reportes - Sistema de Prestamos</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <header class="header-brand" role="banner">
    <div class="brand">
      <h2>Reportes</h2>
      <p class="brand-sub">Estadisticas y exportaciones</p>
    </div>
    <div class="header-actions">
      <button class="btn-sec" onclick="location.href='index.html'" aria-label="Volver al inicio">
        Volver
      </button>
    </div>
  </header>

  <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive" hidden>
    <span id="errorMensaje">Error al cargar datos</span>
    <button onclick="cargarDatos()">Reintentar</button>
  </div>

  <!-- Skeleton -->
  <div class="reportes-container" id="skeletonReportes" aria-busy="true" aria-label="Cargando reportes">
    <div class="reporte-card" aria-hidden="true">
      <div class="skeleton" style="height:16px;width:40%;margin-bottom:14px;"></div>
      <div class="skeleton" style="height:12px;width:80%;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:12px;width:70%;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:12px;width:60%;"></div>
    </div>
    <div class="reporte-card" aria-hidden="true">
      <div class="skeleton" style="height:16px;width:40%;margin-bottom:14px;"></div>
      <div class="skeleton" style="height:60px;width:100%;border-radius:8px;"></div>
    </div>
    <div class="reporte-card" aria-hidden="true">
      <div class="skeleton" style="height:16px;width:40%;margin-bottom:14px;"></div>
      <div class="skeleton" style="height:40px;width:100%;margin-bottom:14px;border-radius:8px;"></div>
      <div class="skeleton" style="height:12px;width:80%;"></div>
    </div>
  </div>

  <!-- Contenido real -->
  <main class="reportes-container" id="reportesReal" style="display:none" aria-busy="false">
    <article class="reporte-card">
      <h3 id="tituloResumen">Resumen General</h3>
      <div id="resumenGeneral" aria-live="polite" aria-labelledby="tituloResumen"></div>
      <button class="btn-primary" onclick="descargarResumenGeneral()" aria-label="Descargar resumen general en CSV">
        Descargar CSV
      </button>
    </article>

    <article class="reporte-card">
      <h3 id="tituloAtrasados">Prestamos Atrasados</h3>
      <div id="prestamosAtrasados" aria-live="polite" aria-labelledby="tituloAtrasados"></div>
      <button class="btn-primary" onclick="descargarPrestamosAtrasados()" aria-label="Descargar lista de atrasados">
        Descargar Lista
      </button>
    </article>

    <article class="reporte-card">
      <h3 id="tituloEstado">Estado de Cuenta</h3>
      <label for="clienteReporte" class="sr-only">Seleccionar cliente</label>
      <select id="clienteReporte" aria-labelledby="tituloEstado" aria-label="Seleccionar cliente para estado de cuenta">
        <option value="todos">Todos los clientes</option>
      </select>
      <div id="estadoCuentaCliente" aria-live="polite"></div>
      <button class="btn-primary" onclick="descargarEstadoCuenta()" aria-label="Descargar estado de cuenta">
        Descargar
      </button>
    </article>

    <article class="reporte-card">
      <h3 id="tituloFlujo">Flujo de Efectivo</h3>
      <div id="flujoEfectivo" aria-live="polite" aria-labelledby="tituloFlujo"></div>
      <button class="btn-primary" onclick="descargarFlujoEfectivo()" aria-label="Descargar flujo de efectivo en CSV">
        Descargar CSV
      </button>
    </article>
  </main>

  <nav class="nav-bottom" role="navigation" aria-label="Navegacion principal">
    <button onclick="location.href='index.html'" aria-label="Inicio">
      <span class="nav-icon" aria-hidden="true">&#9632;</span>
      Inicio
    </button>
    <button onclick="location.href='registro.html'" aria-label="Nuevo prestamo">
      <span class="nav-icon" aria-hidden="true">+</span>
      Nuevo
    </button>
    <button onclick="location.href='clientes.html'" aria-label="Clientes">
      <span class="nav-icon" aria-hidden="true">&#9744;</span>
      Clientes
    </button>
    <button onclick="location.href='historial.html'" aria-label="Historial de pagos">
      <span class="nav-icon" aria-hidden="true">&#9745;</span>
      Pagos
    </button>
    <button class="active" onclick="location.href='reportes.html'" aria-current="page" aria-label="Reportes">
      <span class="nav-icon" aria-hidden="true">&#9633;</span>
      Reportes
    </button>
  </nav>

  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/reportes.js"></script>

  <script>
    let clientes = [];
    let prestamos = [];
    let pagos = [];
    let estaCargando = false;

    window.addEventListener("load", () => cargarDatos());

    async function cargarDatos() {
      if (estaCargando) return;
      estaCargando = true;

      mostrarSkeleton(true);
      ocultarError();

      try {
        const [c, p, pg] = await Promise.all([
          obtenerClientes(),
          obtenerPrestamos(),
          obtenerPagos()
        ]);

        if (c === null || p === null || pg === null) {
          throw new Error("No se pudieron obtener los datos");
        }

        clientes = c;
        prestamos = p;
        pagos = pg;

        poblarSelectClientesReporte();
        renderResumenGeneral();
        renderPrestamosAtrasados();
        renderEstadoCuentaCliente();
        renderFlujoEfectivo();
        mostrarSkeleton(false);
      } catch (err) {
        console.error("[ERROR] cargarDatos:", err);
        mostrarSkeleton(false);
        mostrarError("Error al cargar reportes. Verifica tu conexion.");
      } finally {
        estaCargando = false;
      }
    }

    function mostrarSkeleton(mostrar) {
      const sk = document.getElementById("skeletonReportes");
      const real = document.getElementById("reportesReal");
      if (mostrar) {
        sk.style.display = "flex";
        sk.setAttribute("aria-busy", "true");
        real.style.display = "none";
        real.setAttribute("aria-busy", "true");
      } else {
        sk.style.display = "none";
        sk.setAttribute("aria-busy", "false");
        real.style.display = "flex";
        real.setAttribute("aria-busy", "false");
      }
    }

    function mostrarError(mensaje) {
      const b = document.getElementById("errorBanner");
      document.getElementById("errorMensaje").textContent = mensaje;
      b.hidden = false;
    }

    function ocultarError() {
      document.getElementById("errorBanner").hidden = true;
    }

    function poblarSelectClientesReporte() {
      const select = document.getElementById("clienteReporte");
      select.innerHTML = '<option value="todos">Todos</option>' +
        clientes.map(c => `<option value="${c.id}">${c.nombre || "Sin nombre"}</option>`).join("");
      select.addEventListener("change", renderEstadoCuentaCliente);
    }

    function renderResumenGeneral() {
      const activos = prestamos.filter(p => p.estado !== "pagado");
      const pagados = prestamos.filter(p => p.estado === "pagado");
      const hoy = new Date().toISOString().split("T")[0];
      const atrasados = activos.filter(p => p.fecha_proximo_pago && p.fecha_proximo_pago < hoy);

      const totalPrestado = prestamos.reduce((sum, p) => sum + (p.monto_total || 0), 0);
      const totalCobrado = pagos.filter(p => p.estado === "confirmado").reduce((sum, p) => sum + (p.monto || 0), 0);
      const totalPendiente = activos.reduce((sum, p) => sum + (p.saldo_pendiente || 0), 0);

      document.getElementById("resumenGeneral").innerHTML = `
        <div class="stat-row"><span>Total prestamos:</span><strong>${prestamos.length}</strong></div>
        <div class="stat-row"><span>Activos:</span><strong>${activos.length}</strong></div>
        <div class="stat-row"><span>Pagados:</span><strong>${pagados.length}</strong></div>
        <div class="stat-row"><span>Atrasados:</span><strong class="text-danger">${atrasados.length}</strong></div>
        <div class="stat-row"><span>Clientes:</span><strong>${clientes.length}</strong></div>
        <div class="stat-row"><span>Total prestado:</span><strong>$${formatearMoneda(totalPrestado)}</strong></div>
        <div class="stat-row"><span>Total cobrado:</span><strong class="text-success">$${formatearMoneda(totalCobrado)}</strong></div>
        <div class="stat-row"><span>Total pendiente:</span><strong>$${formatearMoneda(totalPendiente)}</strong></div>
      `;
    }

    function renderPrestamosAtrasados() {
      const hoy = new Date().toISOString().split("T")[0];
      const atrasados = prestamos.filter(p =>
        p.estado !== "pagado" && p.fecha_proximo_pago && p.fecha_proximo_pago < hoy
      );

      const diasAtraso = (fecha) => Math.floor((new Date() - new Date(fecha)) / (1000 * 60 * 60 * 24));

      document.getElementById("prestamosAtrasados").innerHTML = atrasados.length
        ? atrasados.map(p => {
            const cliente = clientes.find(c => c.id === p.cliente_id);
            const dias = diasAtraso(p.fecha_proximo_pago);
            const nombre = cliente?.nombre || "N/A";
            return `
              <div class="prestamo-atrasado">
                <strong title="${nombre}">${nombre}</strong>
                <span>Dias: <strong class="text-danger">${dias}</strong></span>
                <span>Saldo: <strong>$${formatearMoneda(p.saldo_pendiente)}</strong></span>
              </div>`;
          }).join("")
        : "<p class='text-success'>Sin prestamos atrasados</p>";
    }

    function renderEstadoCuentaCliente() {
      const clienteId = document.getElementById("clienteReporte").value;
      let filtered = [];

      if (clienteId === "todos") {
        filtered = clientes.map(c => {
          const prests = prestamos.filter(p => p.cliente_id === c.id);
          const ps = pagos.filter(p => p.cliente_id === c.id && p.estado === "confirmado");
          return {
            cliente: c,
            totalPrestado: prests.reduce((s, p) => s + (p.monto_total || 0), 0),
            totalPagado: ps.reduce((s, p) => s + (p.monto || 0), 0),
            saldoPendiente: prests.filter(p => p.estado !== "pagado").reduce((s, p) => s + (p.saldo_pendiente || 0), 0)
          };
        });
      } else {
        const cliente = clientes.find(c => c.id === clienteId);
        if (cliente) {
          const prests = prestamos.filter(p => p.cliente_id === clienteId);
          const ps = pagos.filter(p => p.cliente_id === clienteId && p.estado === "confirmado");
          filtered = [{
            cliente,
            totalPrestado: prests.reduce((s, p) => s + (p.monto_total || 0), 0),
            totalPagado: ps.reduce((s, p) => s + (p.monto || 0), 0),
            saldoPendiente: prests.filter(p => p.estado !== "pagado").reduce((s, p) => s + (p.saldo_pendiente || 0), 0)
          }];
        }
      }

      document.getElementById("estadoCuentaCliente").innerHTML = filtered.length
        ? filtered.map(r => `
            <div class="cliente-resumen">
              <strong title="${r.cliente.nombre || "Sin nombre"}">${r.cliente.nombre || "Sin nombre"}</strong>
              <div class="stat-row"><span>Total:</span><strong>$${formatearMoneda(r.totalPrestado)}</strong></div>
              <div class="stat-row"><span>Pagado:</span><strong class="text-success">$${formatearMoneda(r.totalPagado)}</strong></div>
              <div class="stat-row"><span>Saldo:</span><strong>$${formatearMoneda(r.saldoPendiente)}</strong></div>
            </div>
          `).join("")
        : "<p>Sin datos</p>";
    }

    function renderFlujoEfectivo() {
      const pagosConfirmados = pagos.filter(p => p.estado === "confirmado");
      const meses = {};

      pagosConfirmados.forEach(p => {
        const fecha = new Date(p.fecha_pago);
        const key = `${fecha.getFullYear()}-${String(fecha.getMonth() + 1).padStart(2, "0")}`;
        meses[key] = (meses[key] || 0) + (p.monto || 0);
      });

      const sortedKeys = Object.keys(meses).sort().reverse().slice(0, 6);
      document.getElementById("flujoEfectivo").innerHTML = sortedKeys.length
        ? sortedKeys.map(k => {
            const [year, month] = k.split("-");
            const fecha = new Date(year, parseInt(month) - 1);
            const nombreMes = fecha.toLocaleDateString("es-MX", { month: "short", year: "numeric" });
            return `<div class="stat-row"><span>${nombreMes}</span><strong>$${formatearMoneda(meses[k])}</strong></div>`;
          }).join("")
        : "<p>Sin datos de pagos</p>";
    }

    async function descargarResumenGeneral() {
      if (typeof generarReporteResumenGeneralCsv === "function") {
        await generarReporteResumenGeneralCsv(clientes, prestamos, pagos);
      }
      mostrarNotificacion("Reporte descargado", "success");
    }

    async function descargarEstadoCuenta() {
      if (typeof generarReporteEstadoCuentaCsv === "function") {
        await generarReporteEstadoCuentaCsv(clientes, prestamos, pagos);
      }
      mostrarNotificacion("Estado de cuenta descargado", "success");
    }

    async function descargarPrestamosAtrasados() {
      if (typeof generarReporteAtrasadosCsv === "function") {
        await generarReporteAtrasadosCsv(clientes, prestamos);
      }
      mostrarNotificacion("Lista descargada", "success");
    }

    async function descargarFlujoEfectivo() {
      if (typeof generarReporteFlujoEfectivoCsv === "function") {
        await generarReporteFlujoEfectivoCsv(pagos);
      }
      mostrarNotificacion("Flujo de efectivo descargado", "success");
    }
  </script>
</body>
</html>
