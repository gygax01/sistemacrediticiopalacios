<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <title>Historial - Sistema de Préstamos</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <header class="header-brand">
    <div class="brand">
      <h2>Historial de Pagos</h2>
      <p class="brand-sub">Registro de pagos</p>
    </div>
    <div class="header-actions">
      <button class="btn-sec" onclick="location.href='index.html'">← Volver</button>
    </div>
  </header>

  <div class="stats-resumen">
    <span>Pagos: <strong id="totalPagosCount">0</strong></span>
    <span>Total: <strong id="totalMontoPagos">$0.00</strong></span>
  </div>

  <div class="filtros">
    <select id="filtroCliente">
      <option value="todos">Todos los clientes</option>
    </select>
    <input type="date" id="fechaInicio">
    <input type="date" id="fechaFin">
    <button class="btn-sm" onclick="renderTablaPagos()">Filtrar</button>
  </div>

  <div id="contenedorTabla" class="table-shell">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Cliente</th>
          <th>Monto</th>
        </tr>
      </thead>
      <tbody id="tablaPagos"></tbody>
    </table>
  </div>

  <nav class="nav-bottom">
    <button onclick="location.href='index.html'">
      <span>📊</span>
      Inicio
    </button>
    <button onclick="location.href='registro.html'">
      <span>➕</span>
      Nuevo
    </button>
    <button onclick="location.href='clientes.html'">
      <span>👥</span>
      Clientes
    </button>
    <button class="active" onclick="location.href='historial.html'">
      <span>📋</span>
      Pagos
    </button>
    <button onclick="location.href='reportes.html'">
      <span>📈</span>
      Reportes
    </button>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/clientes.js"></script>
  <script src="js/prestamos.js"></script>
  <script src="js/pagos.js"></script>
  <script src="js/reportes.js"></script>

  <script>
    window.addEventListener("load", async () => {
      if (typeof ensureClientesCargados === "function") await ensureClientesCargados();
      if (typeof ensurePrestamosCargados === "function") await ensurePrestamosCargados();
      if (typeof ensurePagosCargados === "function") await ensurePagosCargados();

      poblarSelectClientes();
      establecerFechasDefault();
      renderTablaPagos();
    });

    function poblarSelectClientes() {
      const select = document.getElementById("filtroCliente");
      const clientes = obtenerClientes();
      select.innerHTML = '<option value="todos">Todos</option>' +
        clientes.map(c => `<option value="${c.id}">${c.nombre}</option>`).join("");
    }

    function establecerFechasDefault() {
      const hoy = new Date();
      const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
      document.getElementById("fechaInicio").value = inicioMes.toISOString().split("T")[0];
      document.getElementById("fechaFin").value = hoy.toISOString().split("T")[0];
    }

    function formatearMoneda(num) {
      return Number(num || 0).toLocaleString("es-MX", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderTablaPagos() {
      const tbody = document.getElementById("tablaPagos");
      const fechaInicio = document.getElementById("fechaInicio").value;
      const fechaFin = document.getElementById("fechaFin").value;
      const filtroCliente = document.getElementById("filtroCliente").value;
      const pagos = obtenerPagos();
      const clientes = obtenerClientes();

      let filtered = pagos.filter(p => p.estado === "confirmado");

      if (fechaInicio) filtered = filtered.filter(p => p.fecha_pago >= fechaInicio);
      if (fechaFin) filtered = filtered.filter(p => p.fecha_pago <= fechaFin);
      if (filtroCliente !== "todos") filtered = filtered.filter(p => p.cliente_id === filtroCliente);

      filtered.sort((a, b) => new Date(b.fecha_pago) - new Date(a.fecha_pago));

      document.getElementById("totalPagosCount").textContent = filtered.length;
      document.getElementById("totalMontoPagos").textContent = `$${formatearMoneda(
        filtered.reduce((sum, p) => sum + (p.monto || 0), 0)
      )}`;

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center">Sin pagos registrados</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(p => {
        const cliente = clientes.find(c => c.id === p.cliente_id);
        return `
          <tr onclick="verDetallePago('${p.id}')">
            <td data-label="Fecha">${p.fecha_pago}</td>
            <td data-label="Cliente"><strong>${cliente?.nombre || "N/A"}</strong></td>
            <td data-label="Monto">$${formatearMoneda(p.monto)}</td>
          </tr>
        `;
      }).join("");
    }

    function verDetallePago(id) {
      const pago = obtenerPagos().find(p => p.id === id);
      if (!pago) return;

      const cliente = obtenerClientes().find(c => c.id === pago.cliente_id);

      document.getElementById("tituloConfirmacion").textContent = "Detalle del Pago";
      document.getElementById("mensajeConfirmacion").innerHTML = `
        <strong>Cliente:</strong> ${cliente?.nombre || "N/A"}<br><br>
        <strong>Monto:</strong> $${formatearMoneda(pago.monto)}<br>
        <strong>Fecha:</strong> ${pago.fecha_pago}<br>
        <strong>Nota:</strong> ${pago.nota || "Sin nota"}
      `;
      document.getElementById("confirmacion").className = "confirmacion show";
    }
  </script>

  <div class="confirmacion" id="confirmacion">
    <div class="box">
      <h1 id="tituloConfirmacion"></h1>
      <p id="mensajeConfirmacion"></p>
    </div>
  </div>
</body>
</html>
