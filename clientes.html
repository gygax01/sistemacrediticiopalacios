<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <title>Clientes - Sistema de Préstamos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header class="header-brand">
    <div class="brand">
      <h2>Clientes</h2>
      <p class="brand-sub">Gestión de clientes</p>
    </div>
    <div class="header-actions">
      <button class="btn-sec" onclick="location.href='index.html'">← Volver</button>
    </div>
  </header>

  <div class="filtros">
    <input type="text" id="buscador" placeholder="Buscar por nombre o matrícula...">
    <select id="filtroEstado">
      <option value="todos">Todos</option>
      <option value="con_prestamo">Con préstamo</option>
      <option value="sin_prestamo">Sin préstamos</option>
    </select>
  </div>

  <div id="contenedorTabla" class="table-shell">
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Préstamos</th>
          <th>Adeudo</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaClientes"></tbody>
    </table>
  </div>

  <nav class="nav-bottom">
    <button onclick="location.href='index.html'">
      <span>📊</span>
      Inicio
    </button>
    <button onclick="location.href='registro.html'">
      <span>➕</span>
      Nuevo
    </button>
    <button class="active" onclick="location.href='clientes.html'">
      <span>👥</span>
      Clientes
    </button>
    <button onclick="location.href='historial.html'">
      <span>📋</span>
      Pagos
    </button>
    <button onclick="location.href='reportes.html'">
      <span>📈</span>
      Reportes
    </button>
  </nav>

  <div class="modal" id="modalCliente">
    <div class="modal-content">
      <span class="close" onclick="cerrarModal()">&times;</span>
      <h3>Datos del Cliente</h3>
      <div id="detalleCliente"></div>
      <h4>Historial de Préstamos</h4>
      <div id="historialPrestamosCliente"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/clientes.js"></script>
  <script src="js/prestamos.js"></script>

  <script>
    window.addEventListener("load", async () => {
      if (typeof ensureClientesCargados === "function") await ensureClientesCargados();
      if (typeof ensurePrestamosCargados === "function") await ensurePrestamosCargados();
      renderTablaClientes();
      setupFiltros();
    });

    function formatearMoneda(num) {
      return Number(num || 0).toLocaleString("es-MX", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderTablaClientes() {
      const tbody = document.getElementById("tablaClientes");
      const buscador = document.getElementById("buscador").value.toLowerCase();
      const filtroEstado = document.getElementById("filtroEstado").value;
      const clientes = obtenerClientes();
      const prestamos = obtenerPrestamos();

      let filtered = clientes;

      if (buscador) {
        filtered = filtered.filter(c =>
          c.nombre.toLowerCase().includes(buscador) ||
          (c.matricula && c.matricula.toLowerCase().includes(buscador))
        );
      }

      if (filtroEstado === "con_prestamo") {
        const idsConPrestamo = new Set(prestamos.filter(p => p.estado !== "pagado").map(p => p.cliente_id));
        filtered = filtered.filter(c => idsConPrestamo.has(c.id));
      } else if (filtroEstado === "sin_prestamo") {
        const idsConPrestamo = new Set(prestamos.filter(p => p.estado !== "pagado").map(p => p.cliente_id));
        filtered = filtered.filter(c => !idsConPrestamo.has(c.id));
      }

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center">Sin clientes registrados</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(c => {
        const prestamosCliente = prestamos.filter(p => p.cliente_id === c.id && p.estado !== "pagado");
        const totalAdeudo = prestamosCliente.reduce((sum, p) => sum + (p.saldo_pendiente || 0), 0);

        return `
          <tr onclick="verDetalleCliente('${c.id}')">
            <td data-label="Cliente">
              <strong>${c.nombre}</strong><br>
              <small style="color:var(--gray-500)">${c.matricula || "-"} | ${c.telefono || "-"}</small>
            </td>
            <td data-label="Préstamos">${prestamosCliente.length}</td>
            <td data-label="Adeudo">$${formatearMoneda(totalAdeudo)}</td>
            <td data-label="">
              <button class="btn-sm btn-success" onclick="event.stopPropagation(); location.href='registro.html'">+ Préstamo</button>
            </td>
          </tr>
        `;
      }).join("");
    }

    function setupFiltros() {
      document.getElementById("buscador").addEventListener("input", renderTablaClientes);
      document.getElementById("filtroEstado").addEventListener("change", renderTablaClientes);
    }

    function verDetalleCliente(id) {
      const cliente = obtenerClientes().find(c => c.id === id);
      const prestamos = obtenerPrestamos().filter(p => p.cliente_id === id);

      if (!cliente) return;

      document.getElementById("detalleCliente").innerHTML = `
        <p><strong>Nombre:</strong> ${cliente.nombre}</p>
        <p><strong>Matrícula:</strong> ${cliente.matricula || "N/A"}</p>
        <p><strong>Teléfono:</strong> ${cliente.telefono || "N/A"}</p>
        <p><strong>Email:</strong> ${cliente.email || "N/A"}</p>
        <p><strong>Dirección:</strong> ${cliente.direccion || "N/A"}</p>
        <p><strong>Notas:</strong> ${cliente.notas || "N/A"}</p>
        <p><strong>Registrado:</strong> ${new Date(cliente.created_at).toLocaleDateString("es-MX")}</p>
      `;

      document.getElementById("historialPrestamosCliente").innerHTML = prestamos.length
        ? prestamos.map(p => `
            <div class="historial-item">
              <p><strong>Monto:</strong> $${formatearMoneda(p.monto_total)} | <strong>Saldo:</strong> $${formatearMoneda(p.saldo_pendiente)}</p>
              <p><strong>Estado:</strong> ${p.estado} | <strong>Pagos:</strong> ${p.pagos_realizados}/${p.total_pagos}</p>
            </div>
          `).join("")
        : "<p>Sin préstamos registrados</p>";

      document.getElementById("modalCliente").style.display = "flex";
    }

    function cerrarModal() {
      document.getElementById("modalCliente").style.display = "none";
    }

    window.onclick = function(e) {
      const modal = document.getElementById("modalCliente");
      if (e.target === modal) cerrarModal();
    };
  </script>
</body>
</html>
